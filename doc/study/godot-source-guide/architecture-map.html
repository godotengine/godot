<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Godot 源码可视化地图</title>
  <link rel="stylesheet" href="styles.css?v=20260517-4">
</head>
<body class="source-map-page" data-page="architecture-map">
  <div class="layout">
    <aside>
      <div class="brand">
        <div class="mark">G</div>
        <div>
          <h1>源码地图</h1>
          <p>Godot 4.7 beta</p>
        </div>
      </div>

      <div class="nav-title">页面</div>
      <div class="concept-nav">
        <a href="index.html">
          <span>返回导读</span>
          <span>↩</span>
        </a>
        <a href="concepts.html">
          <span>概念库</span>
          <span>◎</span>
        </a>
      </div>

      <div class="nav-title">搜索</div>
      <div class="search">
        <input id="mapSearch" type="search" placeholder="搜索：SceneTree / RID / 模块">
      </div>

      <div class="nav-title">分区</div>
      <div id="mapGroupFilters" class="map-filter-list"></div>

      <div class="nav-title">关系</div>
      <div id="mapRelationFilters" class="map-filter-list compact"></div>

      <div class="progress-wrap">
        <div class="nav-title">读法</div>
        <p class="side-note">默认只显示主关系。点击节点后会展开它的一跳依赖和被依赖，避免高扇出节点把全图变成线团。</p>
      </div>
    </aside>

    <main class="source-map-main">
      <section class="source-map-toolbar" aria-label="源码地图工具栏">
        <div>
          <h2>Godot 源码结构可视化地图</h2>
          <p id="mapStatus">按分区浏览启动、对象、场景、Server、模块、编辑器和底层设计。</p>
        </div>
        <div class="source-map-actions">
          <button id="mapFit" type="button">适配全图</button>
          <button id="mapReset" type="button">重置视图</button>
          <button id="mapFocus" type="button">聚焦节点</button>
        </div>
      </section>

      <section class="source-map-shell" aria-label="Godot 源码可视化地图">
        <div class="source-map-canvas-wrap">
          <svg id="sourceMapSvg" class="source-map-svg" role="img" aria-labelledby="sourceMapTitle sourceMapDesc">
            <title id="sourceMapTitle">Godot 源码结构可视化地图</title>
            <desc id="sourceMapDesc">可缩放、可平移、可过滤的 Godot 源码架构节点图。</desc>
          </svg>
          <div class="map-minimap" id="mapMiniStatus" aria-live="polite">100%</div>
        </div>

        <aside class="source-map-detail" id="mapDetail" aria-live="polite">
          <div class="source-map-detail-empty">
            <p class="detail-kicker">选择一个节点</p>
            <h2>从地图开始追一条源码路径</h2>
            <p>点击任意节点查看小白解释、源码锚点、依赖关系和正文/概念链接。滚轮缩放，拖拽平移。</p>
          </div>
        </aside>
      </section>
    </main>
  </div>

  <script src="data.js" defer></script>
  <script src="source-map.js?v=20260517-9" defer></script>
</body>
</html>
