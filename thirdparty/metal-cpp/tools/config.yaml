    exclude:
      methods: ["(?i)deprecated"]
    class_overrides:
      MTL4RenderCommandEncoder:
        rename:
          "setBlendColorRed:green:blue:alpha:": setBlendColor
          "setStencilFrontReferenceValue:backReferenceValue:": setStencilReferenceValues
      # Upstream MTL4::CommandQueue collapses both `waitForEvent:value:` and
      # `waitForDrawable:` to `wait` (overloaded). Apinotes' SwiftName keeps
      # the full selector verbatim.
      MTL4CommandQueue:
        rename:
          "waitForEvent:value:": wait
          "waitForDrawable:": wait
      # Owned by upstream MTLAccelerationStructureTypes.hpp (in MTL4 namespace).
      MTL4BufferRange: {skip: true}
      # Packed structs that need _MTL4_PACKED.
      MTL4UpdateSparseTextureMappingOperation: {packed: true}
      MTL4CopySparseTextureMappingOperation: {packed: true}
      MTL4UpdateSparseBufferMappingOperation: {packed: true}
      MTL4CopySparseBufferMappingOperation: {packed: true}
      MTL4TimestampHeapEntry: {packed: true}
