    exclude:
      methods: ["(?i)deprecated"]
    keep_upstream:
      - MTLDefines                       # _MTL_INLINE / _MTL_ENUM / _MTL_PACKED
      - MTLGPUAddress                    # GPUAddress typedef
      # Constructors / operator[] over anonymous-union SIMD layouts the
      # parser can't introspect (MTL::PackedFloat3, PackedFloat4x3,
      # AxisAlignedBoundingBox, PackedFloatQuaternion).
      - MTLAccelerationStructureTypes
      # Only here because MTLAccelerationStructureTypes.hpp `#include`s it.
      # Otherwise unused — generated wrappers dispatch via _objc_msgSend$<sel>.
      - MTLPrivate
    headers:
      # Type / pixel-format / enum headers parsed first so enums register
      # before the headers that reference them.
      - MTLTypes.h
      - MTLPixelFormat.h
      - MTLDataType.h
      - MTLStageInputOutputDescriptor.h
      - MTLArgument.h
      - MTLResource.h
      - MTLDepthStencil.h
      - MTLSampler.h
      - MTLRenderPass.h
      - MTLRenderPipeline.h
      - MTLAccelerationStructure.h
      - MTLAccelerationStructureCommandEncoder.h
      - MTLAccelerationStructureTypes.h
      - MTLAllocation.h
      - MTLArgument.h
      - MTLArgumentEncoder.h
      - MTLBinaryArchive.h
      - MTLBlitCommandEncoder.h
      - MTLBlitPass.h
      - MTLBuffer.h
      - MTLCaptureManager.h
      - MTLCaptureScope.h
