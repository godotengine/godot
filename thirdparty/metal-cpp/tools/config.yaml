  # ── MetalFX ────────────────────────────────────────────────────────────
  - name: MetalFX
    namespace: MTLFX
    prefix: MTLFX
    strip_prefix: MTLFX
    shared: true
    sdks: [macos, iphoneos, tvos, visionos]
    # MetalFX.hpp also surfaces the MTL4FX:: virtual framework so a single
    # client include exposes both namespaces (mirrors Metal.hpp pulling in
    # Metal4.hpp).
    extra_umbrella_includes: [Metal4FX.hpp]
    include:
      classes:
        - MTLFXFrameInterpolatableScaler
        - MTLFXFrameInterpolator
        - MTLFXFrameInterpolatorBase
        - MTLFXFrameInterpolatorDescriptor
        - MTLFXSpatialScaler
        - MTLFXSpatialScalerBase
        - MTLFXSpatialScalerDescriptor
        - MTLFXTemporalDenoisedScaler
        - MTLFXTemporalDenoisedScalerBase
        - MTLFXTemporalDenoisedScalerDescriptor
        - MTLFXTemporalScaler
        - MTLFXTemporalScalerBase
        - MTLFXTemporalScalerDescriptor
    exclude:
      methods: ["(?i)deprecated"]
    keep_upstream:
      - MTLFXDefines
    headers:
      - MTLFXSpatialScaler.h
      - MTLFXTemporalScaler.h
      - MTLFXFrameInterpolator.h
      - MTLFXTemporalDenoisedScaler.h

  # ── Metal4FX (virtual framework sharing MetalFX/ but in MTL4FX:: namespace) ──
    class_overrides: {}
  - name: Metal4FX
    namespace: MTL4FX
    prefix: MTL4FX
    strip_prefix: MTL4FX
    shared: true
    sdk_framework: MetalFX     # SDK headers come from MetalFX.framework
    output_subdir: MetalFX     # ...but write into metal-cpp/MetalFX/
    sdks: [macos, iphoneos, tvos, visionos]
    include:
      classes:
        - MTL4FXFrameInterpolator
        - MTL4FXSpatialScaler
        - MTL4FXTemporalDenoisedScaler
        - MTL4FXTemporalScaler
    exclude:
      methods: ["(?i)deprecated"]
    headers:
      - MTL4FXSpatialScaler.h
      - MTL4FXTemporalScaler.h
      - MTL4FXFrameInterpolator.h
      - MTL4FXTemporalDenoisedScaler.h

  # ── QuartzCore ─────────────────────────────────────────────────────────
    class_overrides: {}
  - name: QuartzCore
    namespace: CA
    prefix: CA
    strip_prefix: CA
    shared: true
    sdks: [macos, iphoneos, tvos, visionos]
    include:
      classes:
        - CALayer
        - CAMetalDrawable
        - CAMetalLayer
    exclude:
      methods: ["(?i)deprecated"]
    keep_upstream:
      - CADefines
    headers:
      - CAEDRMetadata.h
      - CALayer.h
      - CAMetalLayer.h
    class_overrides:
      CALayer:
        include:
          members:
            - contentsHeadroom
            - opaque
            - preferredDynamicRange
            - 'setContentsHeadroom:'
            - 'setOpaque:'
            - 'setPreferredDynamicRange:'
            - 'setWantsExtendedDynamicRangeContent:'
            - wantsExtendedDynamicRangeContent
      CAMetalLayer:
        exclude:
          members:
            - EDRMetadata
            - developerHUDProperties
            - preferredDevice
            - presentsWithTransaction
