      - MTLComputeCommandEncoder.h
      - MTLComputePass.h
      - MTLComputePipeline.h
      - MTLCounters.h
      - MTLDataType.h
      - MTLDepthStencil.h
      - MTLDevice.h
      - MTLDeviceCertification.h
      - MTLDrawable.h
      - MTLDynamicLibrary.h
      - MTLEvent.h
      - MTLFence.h
      - MTLFunctionConstantValues.h
      - MTLFunctionDescriptor.h
      - MTLFunctionHandle.h
      - MTLFunctionLog.h
      - MTLFunctionStitching.h
      - MTLHeap.h
      - MTLIOCommandBuffer.h
      - MTLIOCommandQueue.h
      - MTLIOCompressor.h
      - MTLIndirectCommandBuffer.h
      - MTLIndirectCommandEncoder.h
      - MTLIntersectionFunctionTable.h
      - MTLLibrary.h
      - MTLLinkedFunctions.h
      - MTLLogState.h
      - MTLParallelRenderCommandEncoder.h
      - MTLPipeline.h
      - MTLPixelFormat.h
      - MTLRasterizationRate.h
      - MTLRenderCommandEncoder.h
      - MTLRenderPass.h
      - MTLRenderPipeline.h
      - MTLResidencySet.h
      - MTLResource.h
      - MTLResourceStateCommandEncoder.h
      - MTLResourceStatePass.h
      - MTLResourceViewPool.h
      - MTLSampler.h
      - MTLStageInputOutputDescriptor.h
      - MTLTensor.h
      - MTLTexture.h
      - MTLTextureViewPool.h
      - MTLVertexDescriptor.h
      - MTLVisibleFunctionTable.h
    class_overrides:
      # Apple-style selector groupings where the first word echoes the
      # first arg (`setBlendColorRed:green:blue:alpha:` — Red/green/blue/
      # alpha is a color quartet). Upstream metal-cpp drops the Red.
      # `setStencilFrontReferenceValue:backReferenceValue:` is the same
      # pattern — front/back is a value pair — and upstream collapses to
      # the plural noun. Apinotes carries `setBlendColor` already.
      # `barrierAfterQueueStages:beforeStages:` is one of several MTL4
      # barrier variants on MTLCommandEncoder (`barrierAfterStages`,
      # `barrierAfterEncoderStages`, ...). Apinotes maps it to plain
      # `barrier`, which collides at the call site with the bare `barrier`
      # selector and obscures which variant is being called. Keep the
      # descriptive form.
      MTLCommandEncoder:
        rename:
          "barrierAfterQueueStages:beforeStages:": barrierAfterQueueStages
      MTLRenderCommandEncoder:
        rename:
          "setBlendColorRed:green:blue:alpha:": setBlendColor
          "setStencilFrontReferenceValue:backReferenceValue:": setStencilReferenceValues
      # `encodeWaitForEvent:value:` — apinotes' SwiftName matches the
      # selector verbatim, but upstream metal-cpp shortens to `encodeWait`.
      MTLCommandBuffer:
        rename:
          "encodeWaitForEvent:value:": encodeWait
          # Two `presentDrawable:...` overloads have the same C++ signature
          # (Drawable*, CFTimeInterval); without distinct names the
          # signature-dedup pass drops one. Names match upstream metal-cpp.
          "presentDrawable:atTime:": presentDrawableAtTime
          "presentDrawable:afterMinimumDuration:": presentDrawableAfterMinimumDuration
      # Heuristic over-strips `For<Word>` on these selectors; apinotes has
      # no SwiftName entry so it can't restore them. Match upstream.
      MTLDevice:
        rename:
          "minimumLinearTextureAlignmentForPixelFormat:": minimumLinearTextureAlignmentForPixelFormat
          "minimumTextureBufferAlignmentForPixelFormat:": minimumTextureBufferAlignmentForPixelFormat
      # These live in upstream's hand-written MTLAccelerationStructureTypes.hpp
      # which we keep verbatim — it carries C++ constructors / operator
      # overloads the SDK headers expose only as anonymous-union magic the
      # parser can't reach. Register so resolution works; skip emission.
        exclude:
          members:
            - barycentricCoordsSupported
            - programmableSamplePositionsSupported
            - rasterOrderGroupsSupported
            - supportsPlacementSparse
      MTLPackedFloat3: {skip: true}
      MTLPackedFloat4x3: {skip: true}
      MTLAxisAlignedBoundingBox: {skip: true}
      MTLPackedFloatQuaternion: {skip: true}
      MTLComponentTransform: {skip: true}
      # Upstream MTLAccelerationStructureTypes.hpp puts BufferRange in MTL4::
      # (not MTL::) — pin the resolved cpp name so refs match.
      MTL4BufferRange: {skip: true, cpp_name: "MTL4::BufferRange"}
      # Packed structs — every upstream Metal struct ending in `_MTL_PACKED;`.
      # The SDK doesn't carry __attribute__((packed)), so we declare it here.
      MTL4UpdateSparseTextureMappingOperation: {packed: true}
      MTL4CopySparseTextureMappingOperation: {packed: true}
      MTL4UpdateSparseBufferMappingOperation: {packed: true}
      MTL4CopySparseBufferMappingOperation: {packed: true}
      MTL4TimestampHeapEntry: {packed: true}
      # MTL4BufferRange — see skip entry above; upstream owns it.
      MTLAccelerationStructureInstanceDescriptor: {packed: true}
      MTLAccelerationStructureUserIDInstanceDescriptor: {packed: true}
      MTLAccelerationStructureMotionInstanceDescriptor: {packed: true}
      MTLIndirectAccelerationStructureInstanceDescriptor: {packed: true}
      MTLIndirectAccelerationStructureMotionInstanceDescriptor: {packed: true}
      # MTLPackedFloat3 / 4x3 / Quaternion / AxisAlignedBoundingBox /
      # ComponentTransform are declared with `skip: true` above —
      # kept-upstream definitions own them.
      MTLDispatchThreadgroupsIndirectArguments: {packed: true}
      MTLDispatchThreadsIndirectArguments: {packed: true}
      MTLStageInRegionIndirectArguments: {packed: true}
      MTLCounterResultTimestamp: {packed: true}
      MTLCounterResultStageUtilization: {packed: true}
      MTLCounterResultStatistic: {packed: true}
      MTLAccelerationStructureSizes: {packed: true}
      MTLSizeAndAlign: {packed: true}
      MTLIndirectCommandBufferExecutionRange: {packed: true}
      MTLIntersectionFunctionBufferArguments: {packed: true}
      MTLScissorRect: {packed: true}
      MTLViewport: {packed: true}
      MTLDrawPrimitivesIndirectArguments: {packed: true}
      MTLDrawIndexedPrimitivesIndirectArguments: {packed: true}
      MTLVertexAmplificationViewMapping: {packed: true}
      MTLDrawPatchIndirectArguments: {packed: true}
      MTLQuadTessellationFactorsHalf: {packed: true}
      MTLTriangleTessellationFactorsHalf: {packed: true}
      MTLMapIndirectArguments: {packed: true}
      # Upstream metal-cpp ships constructors + `Make`/`Default` factories on
      # these struct types; the SDK only exposes plain C structs so we inject
      # the convenience members here.
      MTLTextureSwizzleChannels:
        packed: true
        members: |
          TextureSwizzleChannels() = default;
          TextureSwizzleChannels(MTL::TextureSwizzle r, MTL::TextureSwizzle g, MTL::TextureSwizzle b, MTL::TextureSwizzle a)
              : red(r), green(g), blue(b), alpha(a) {}
          static TextureSwizzleChannels Default() { return TextureSwizzleChannels(); }
          static TextureSwizzleChannels Make(MTL::TextureSwizzle r, MTL::TextureSwizzle g, MTL::TextureSwizzle b, MTL::TextureSwizzle a) {
              return TextureSwizzleChannels(r, g, b, a);
          }
      MTLOrigin:
        packed: true
        members: |
          Origin() = default;
          Origin(NS::UInteger x_, NS::UInteger y_, NS::UInteger z_) : x(x_), y(y_), z(z_) {}
          static Origin Make(NS::UInteger x_, NS::UInteger y_, NS::UInteger z_) { return Origin(x_, y_, z_); }
      MTLSize:
        packed: true
        members: |
          Size() = default;
          Size(NS::UInteger w, NS::UInteger h, NS::UInteger d) : width(w), height(h), depth(d) {}
          static Size Make(NS::UInteger w, NS::UInteger h, NS::UInteger d) { return Size(w, h, d); }
      MTLRegion:
        packed: true
        members: |
          Region() = default;
          Region(NS::UInteger x, NS::UInteger width) : origin(x, 0, 0), size(width, 1, 1) {}
          Region(NS::UInteger x, NS::UInteger y, NS::UInteger width, NS::UInteger height) : origin(x, y, 0), size(width, height, 1) {}
          Region(NS::UInteger x, NS::UInteger y, NS::UInteger z, NS::UInteger width, NS::UInteger height, NS::UInteger depth)
              : origin(x, y, z), size(width, height, depth) {}
          static Region Make1D(NS::UInteger x, NS::UInteger width) { return Region(x, width); }
          static Region Make2D(NS::UInteger x, NS::UInteger y, NS::UInteger width, NS::UInteger height) { return Region(x, y, width, height); }
          static Region Make3D(NS::UInteger x, NS::UInteger y, NS::UInteger z, NS::UInteger width, NS::UInteger height, NS::UInteger depth) {
              return Region(x, y, z, width, height, depth);
          }
      MTLSamplePosition:
        packed: true
        members: |
          SamplePosition() = default;
          SamplePosition(float x_, float y_) : x(x_), y(y_) {}
          static SamplePosition Make(float x_, float y_) { return SamplePosition(x_, y_); }
      MTLResourceID: {packed: true}
      MTLClearColor:
        packed: true
        members: |
          ClearColor() = default;
          ClearColor(double r, double g, double b, double a) : red(r), green(g), blue(b), alpha(a) {}
          static ClearColor Make(double r, double g, double b, double a) { return ClearColor(r, g, b, a); }

  # ── Metal4 (virtual framework sharing Metal/ but in MTL4:: namespace) ──
      MTLCaptureManager:
        exclude:
          members:
            - init
      MTLCaptureScope:
        exclude:
          members:
            - mtl4CommandQueue
      MTLFunctionReflection:
        include:
          members:
            - bindings
      MTLRasterizationRateLayerDescriptor:
        exclude:
          members:
            - init
      MTLSharedEventListener:
        exclude:
          members:
            - init
  - name: Metal4
    namespace: MTL4
    prefix: MTL4
    strip_prefix: MTL4
    shared: true
    sdk_framework: Metal     # SDK headers come from Metal.framework
    output_subdir: Metal     # ...but write into metal-cpp/Metal/
    sdks: [macos, iphoneos, tvos, visionos]
    include:
      classes:
        - MTL4AccelerationStructureBoundingBoxGeometryDescriptor
        - MTL4AccelerationStructureCurveGeometryDescriptor
