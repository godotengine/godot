# yaml-language-server: $schema=./config.schema.json

sdks:
  - name: macos
    xcrun_sdk: macosx
  - name: iphoneos
    xcrun_sdk: iphoneos
  - name: tvos
    xcrun_sdk: appletvos
  - name: visionos
    xcrun_sdk: xros

frameworks:
  # ── Foundation ─────────────────────────────────────────────────────────
  - name: Foundation
    namespace: NS
    prefix: NS
    strip_prefix: NS
    # Generate once from the first applicable SDK (macos). Multi-SDK
    # would otherwise let visionos overwrite macos output, losing methods
    # whose `API_AVAILABLE(...)` omits visionos (libclang excludes them
    # from the AST when parsing against the visionOS SDK).
    shared: true
    sdks: [macos, iphoneos, tvos, visionos]
    include:
      classes:
        - NSArray
        - NSAutoreleasePool
        - NSBundle
        - NSCondition
        - NSCopying
        - NSData
        - NSDate
        - NSDictionary
        - NSEnumerator
        - NSError
        - NSFastEnumeration
        - NSLocking
        - NSNotification
        - NSNotificationCenter
        - NSNumber
        - NSObject
        - NSProcessInfo
        - NSReferencing
        - NSSecureCoding
        - NSSet
        - NSString
        - NSURL
        - NSValue
    exclude:
      methods: ["(?i)deprecated"]
      classes:
        # On-demand-resource API; pulls in a chain of NSBundle internals not
        # used by Godot. Upstream metal-cpp doesn't wrap it either.
        - NSBundleResourceRequest
        # Mutable collection variants are unused by the driver and upstream
        # metal-cpp doesn't wrap them; skip to keep the surface small.
        - NSMutableArray
        - NSMutableData
        - NSMutableDictionary
        - NSMutableSet
    # Hand-written infrastructure copied verbatim from upstream metal-cpp.
    keep_upstream:
      - NSDefines       # _NS_EXPORT, _NS_INLINE, _NS_ENUM, _NS_PACKED, ...
      - NSObjCRuntime   # NS::Integer / NS::UInteger / NS::ComparisonResult
      - NSRange         # NS::Range struct with hand-written helpers
      - NSSharedPtr     # NS::SharedPtr / NS::TransferPtr / NS::RetainPtr
      - NSTypes         # NS::TimeInterval, NS::OperatingSystemVersion
      # NSObject (CRTP root) and NSEnumerator (templated container) are
      # both emitted by the generator — see generate_nsobject_header /
      # generate_nsenumerator_header. They route through the same
      # `_objc_msgSend$<sel>` stub trampolines as every other wrapper.
    headers:
      - NSArray.h
      - NSAutoreleasePool.h
      - NSBundle.h
      - NSData.h
      - NSDate.h
      - NSDictionary.h
      - NSError.h
      - NSLock.h
      - NSNotification.h
      - NSNumber.h
      - NSValue.h  # actually owns @interface NSNumber : NSValue
      - NSObject.h
      - NSProcessInfo.h
      - NSSet.h
      - NSString.h
      - NSURL.h
    class_overrides:
      # Upstream metal-cpp keeps the `WithPath` qualifier on NSURL init
      # selectors (no SwiftName entry to drive the rename); heuristic strips it.
      NSURL:
        rename:
          "initFileURLWithPath:": initFileURLWithPath
        include:
          members:
            - fileSystemRepresentation
            - 'fileURLWithPath:'
            - 'initFileURLWithPath:'
            - 'initWithString:'
      NSString:
        include:
          members:
            - UTF8String
            - 'cStringUsingEncoding:'
            - 'caseInsensitiveCompare:'
            - 'characterAtIndex:'
            - fileSystemRepresentation
            - 'initWithBytes:length:encoding:'
            - 'initWithBytesNoCopy:length:encoding:freeWhenDone:'
            - 'initWithCString:encoding:'
            - 'initWithString:'
            - 'isEqualToString:'
            - length
            - 'lengthOfBytesUsingEncoding:'
            - 'maximumLengthOfBytesUsingEncoding:'
            - 'rangeOfString:options:'
            - string
            - 'stringByAppendingString:'
            - 'stringWithCString:encoding:'
            - 'stringWithString:'
        append: |
          /// Create an NS::String* from a string literal.
          #define MTLSTR(literal) (NS::String*)__builtin___CFStringMakeConstantString("" literal "")

          template <std::size_t _StringLen>
          [[deprecated("please use MTLSTR(str)")]] constexpr const String* MakeConstantString(const char (&str)[_StringLen])
          {
              return reinterpret_cast<const String*>(__CFStringMakeConstantString(str));
          }
      # Packed structs — match upstream's `_NS_PACKED` emission. The SDK
      # doesn't carry __attribute__((packed)) on these, so libclang can't
      # discover them automatically.
      # Already defined in kept-upstream NSTypes.hpp; register so cross-refs
      # resolve, but skip emission so we don't duplicate.
      NSOperatingSystemVersion: {skip: true}
      # NSFastEnumerationState lives in upstream's NSEnumerator.hpp, but our
      # generator replaces that hpp, so the struct must be emitted here.
      NSFastEnumerationState: {packed: true}
      NSArray:
        include:
          members:
            - array
            - 'arrayWithObject:'
            - 'arrayWithObjects:count:'
            - count
            - 'initWithCoder:'
            - 'initWithObjects:count:'
            - 'objectAtIndex:'
            - objectEnumerator
      NSBundle:
        include:
          members:
            - 'URLForAuxiliaryExecutable:'
            - allBundles
            - allFrameworks
            - alloc
            - appStoreReceiptURL
            - builtInPlugInsPath
            - builtInPlugInsURL
            - bundleIdentifier
            - bundlePath
            - bundleURL
            - 'bundleWithPath:'
            - 'bundleWithURL:'
            - executablePath
            - executableURL
            - infoDictionary
            - 'initWithPath:'
            - 'initWithURL:'
            - isLoaded
            - load
            - 'loadAndReturnError:'
            - localizedInfoDictionary
            - 'localizedStringForKey:value:table:'
            - mainBundle
            - 'objectForInfoDictionaryKey:'
            - 'pathForAuxiliaryExecutable:'
            - 'preflightAndReturnError:'
            - privateFrameworksPath
            - privateFrameworksURL
            - resourcePath
            - resourceURL
            - sharedFrameworksPath
            - sharedFrameworksURL
            - sharedSupportPath
            - sharedSupportURL
            - unload
      NSCondition:
        exclude:
          members:
            - name
      NSData:
        include:
          members:
            - bytes
            - length
            - mutableBytes
      NSDate:
        include:
          members:
            - 'dateWithTimeIntervalSinceNow:'
      NSDictionary:
        include:
          members:
            - count
            - dictionary
            - 'dictionaryWithObject:forKey:'
            - 'dictionaryWithObjects:forKeys:count:'
            - 'initWithCoder:'
            - 'initWithObjects:forKeys:count:'
            - keyEnumerator
            - 'objectForKey:'
      NSError:
        include:
          members:
            - code
            - domain
            - 'errorWithDomain:code:userInfo:'
            - 'initWithDomain:code:userInfo:'
            - localizedDescription
            - localizedFailureReason
            - localizedRecoveryOptions
            - localizedRecoverySuggestion
            - userInfo
      NSFastEnumeration:
        include:
          members:
            - allObjects
            - 'countByEnumeratingWithState:objects:count:'
            - nextObject
      NSNotification:
        include:
          members:
            - name
            - object
            - userInfo
      NSNotificationCenter:
        include:
          members:
            - 'addObserverName:object:queue:block:'
            - defaultCenter
            - 'removeObserver:'
      NSNumber:
        exclude:
          members:
            - 'initWithInteger:'
            - 'initWithUnsignedInteger:'
            - 'numberWithInteger:'
            - 'numberWithUnsignedInteger:'
      NSObject:
        include:
          members:
            - alloc
            - debugDescription
            - description
            - hash
            - init
            - 'isEqual:'
            - 'methodSignatureForSelector:'
            - 'respondsToSelector:'
      NSProcessInfo:
        exclude:
          members:
            - iOSAppOnMac
            - iOSAppOnVision
            - isiOSAppOnVision
            - operatingSystemName
      NSSet:
        include:
          members:
            - count
            - 'initWithCoder:'
            - 'initWithObjects:count:'
            - objectEnumerator
      NSValue:
        include:
          members:
            - 'getValue:size:'
            - 'initWithBytes:objCType:'
            - 'initWithCoder:'
            - 'isEqualToValue:'
            - objCType
            - pointerValue
            - 'valueWithBytes:objCType:'
            - 'valueWithPointer:'
  - name: Metal
    namespace: MTL
    prefix: MTL
    strip_prefix: MTL
    shared: true
    sdks: [macos, iphoneos, tvos, visionos]
