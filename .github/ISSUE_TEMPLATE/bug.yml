name: Bug Report
description: Report a rendering or performance issue
title: "[BUG] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What went wrong?
    validations:
      required: true

  - type: input
    id: godot_version
    attributes:
      label: Godot Version
      placeholder: "4.3.stable"
    validations:
      required: true

  - type: input
    id: gpu
    attributes:
      label: GPU
      placeholder: "RTX 3090"

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      value: |
        1. Load scene with 1M Gaussians
        2. Enable shadows
        3. Observe crash/error

  - type: textarea
    id: logs
    attributes:
      label: Error Logs
      description: Paste relevant errors
      render: shell