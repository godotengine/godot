name: Baseline QA Automation

on:
  push:
    branches: [ master, develop, feature/*, phase* ]
    paths:
      - 'modules/gaussian_splatting/**'
      - 'tests/**'
      - 'test_*.gd'
      - '.github/workflows/baseline_qa.yml'
  pull_request:
    branches: [ master, develop ]
  schedule:
    # Nightly baseline refresh run at 03:30 UTC.
    - cron: '30 3 * * *'
  workflow_dispatch:
    inputs:
      debug_mode:
        description: 'Enable debug mode with detailed logging'
        required: false
        default: false
        type: boolean
      baseline_mode:
        description: 'QA baseline mode (compare against stored baseline or refresh it)'
        required: false
        default: compare
        type: choice
        options:
          - compare
          - update

env:
  GODOT_BINARY: "godot"

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: write

jobs:
  gpu-tests:
    name: GPU QA Tests (Windows Self-Hosted)
    runs-on: [self-hosted, Windows, X64, godotgs, gpu]
    timeout-minutes: 120

    defaults:
      run:
        working-directory: repo
        shell: pwsh

    steps:
    - name: Configure Git safe.directory
      working-directory: ${{ github.workspace }}
      run: |
        git config --global --add safe.directory '*'

    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        path: repo
        fetch-depth: 0
        submodules: recursive
        set-safe-directory: false

    - name: Verify Python
      run: |
        python --version

    - name: Set up MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Install SCons
      run: |
        python -m pip install --upgrade pip
        python -m pip install scons numpy pillow

    - name: Build module-enabled Godot editor
      run: |
        python -m SCons platform=windows target=editor dev_build=yes tests=yes gs_native_arch=no cache_path=C:/godotgs-scons-cache cache_limit=50 -j12

    - name: Resolve Godot binary
      id: godot_binary
      run: |
        $candidates = @(
          "bin\godot.windows.editor.dev.x86_64.console.exe",
          "bin\godot.windows.editor.dev.x86_64.exe",
          "bin\godot.windows.editor.x86_64.console.exe",
          "bin\godot.windows.editor.x86_64.exe"
        )
        $resolved = $null
        foreach ($candidate in $candidates) {
          if (Test-Path -LiteralPath $candidate) {
            $resolved = (Resolve-Path -LiteralPath $candidate).Path
            break
          }
        }
        if (-not $resolved) {
          throw "Could not find built Godot binary in expected bin\ paths."
        }
        Write-Host "Resolved Godot binary: $resolved"
        "path=$resolved" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        "GODOT_BINARY=$resolved" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Resolve baseline mode
      id: baseline_mode
      run: |
        $mode = "compare"
        $reason = "default-compare"
        if ("${{ github.event_name }}" -eq "schedule") {
          $mode = "update"
          $reason = "nightly-schedule-update"
        } elseif ("${{ github.event_name }}" -eq "workflow_dispatch" -and "${{ inputs.baseline_mode }}" -eq "update") {
          $mode = "update"
          $reason = "manual-update"
        }
        "mode=$mode" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        "reason=$reason" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        Write-Host "Resolved baseline mode: $mode ($reason)"

    - name: Run GPU QA tests
      env:
        GS_CI_GPU_REQUIRED: "1"
        GS_CI_VALIDATION_MODE: "strict"
      run: |
        $args = @(
          "--categories", "sorting,qa",
          "--godot", $env:GODOT_BINARY
        )
        python tests/ci/run_baseline_qa.py @args

    - name: Upload GPU test artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: baseline-qa-gpu-results
        path: |
          repo/baseline_qa_results.json
          repo/tests/ci/qa_results.json
          repo/*test_results.json
          repo/*.log
        if-no-files-found: warn
        retention-days: 30

    - name: Post GPU test summary
      if: always()
      run: |
        $summaryFile = $env:GITHUB_STEP_SUMMARY
        "# GPU QA Test Results" | Out-File -FilePath $summaryFile -Encoding utf8 -Append
        "" | Out-File -FilePath $summaryFile -Encoding utf8 -Append
        "- Trigger: ``${{ github.event_name }}``" | Out-File -FilePath $summaryFile -Encoding utf8 -Append
        "- Baseline mode: ``${{ steps.baseline_mode.outputs.mode }}`` (${{ steps.baseline_mode.outputs.reason }})" | Out-File -FilePath $summaryFile -Encoding utf8 -Append
        "" | Out-File -FilePath $summaryFile -Encoding utf8 -Append

        if (Test-Path "baseline_qa_results.json") {
          $data = Get-Content "baseline_qa_results.json" -Raw | ConvertFrom-Json
          "## Test Summary" | Out-File -FilePath $summaryFile -Encoding utf8 -Append
          "| Metric | Value |" | Out-File -FilePath $summaryFile -Encoding utf8 -Append
          "|--------|-------|" | Out-File -FilePath $summaryFile -Encoding utf8 -Append
          "| Total Tests | $($data.total_tests) |" | Out-File -FilePath $summaryFile -Encoding utf8 -Append
          "| Passed | $($data.passed_tests) |" | Out-File -FilePath $summaryFile -Encoding utf8 -Append
          "| Failed | $($data.failed_tests) |" | Out-File -FilePath $summaryFile -Encoding utf8 -Append
          if ($data.total_tests -gt 0) {
            $rate = [math]::Round($data.passed_tests / $data.total_tests * 100, 1)
            "| Success Rate | ${rate}% |" | Out-File -FilePath $summaryFile -Encoding utf8 -Append
          }
          "" | Out-File -FilePath $summaryFile -Encoding utf8 -Append
          "## Test Details" | Out-File -FilePath $summaryFile -Encoding utf8 -Append
          foreach ($test in $data.tests) {
            $status = if ($test.success) { "PASS" } else { "FAIL" }
            $duration = [math]::Round($test.duration, 1)
            "- $status **$($test.name)** (${duration}s)" | Out-File -FilePath $summaryFile -Encoding utf8 -Append
          }
        } else {
          "Test results file not found" | Out-File -FilePath $summaryFile -Encoding utf8 -Append
        }

  cpu-tests:
    name: CPU-Only QA Tests
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy pillow

    - name: Install build and runtime dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          scons \
          pkg-config \
          libx11-dev \
          libxcursor-dev \
          libxinerama-dev \
          libxi-dev \
          libxrandr-dev \
          libgl1-mesa-dev \
          libglu1-mesa-dev \
          libasound2-dev \
          libpulse-dev \
          libudev-dev \
          libvulkan-dev \
          mesa-vulkan-drivers \
          xvfb

    - name: Restore SCons build cache
      uses: actions/cache@v4
      with:
        path: .scons_cache
        key: scons-linux-${{ hashFiles('SConstruct', 'methods.py') }}-${{ github.sha }}
        restore-keys: |
          scons-linux-${{ hashFiles('SConstruct', 'methods.py') }}-
          scons-linux-

    - name: Build module-enabled Godot editor
      run: |
        scons platform=linuxbsd target=editor dev_build=yes tests=yes cache_path=.scons_cache cache_limit=10 -j"$(nproc)"

    - name: Resolve module-enabled Godot binary
      id: godot_binary
      run: |
        GODOT_BIN="$(find bin -maxdepth 1 -type f -executable -name 'godot*linuxbsd*editor*' | head -n 1)"
        if [ -z "$GODOT_BIN" ]; then
          echo "Could not locate built Godot editor binary in bin"
          ls -la bin
          exit 1
        fi
        echo "path=$GODOT_BIN" >> "$GITHUB_OUTPUT"
        echo "GODOT_BINARY=$GODOT_BIN" >> "$GITHUB_ENV"
        echo "Using module-enabled binary: $GODOT_BIN"

    - name: Verify module-enabled Godot installation
      run: |
        "$GODOT_BINARY" --version
        echo "Module-enabled Godot binary is accessible"

    - name: Setup virtual display
      run: |
        export DISPLAY=:99
        sudo Xvfb :99 -screen 0 1920x1080x24 &
        sleep 3

    - name: Import Godot project
      env:
        DISPLAY: :99
      run: |
        mkdir -p ~/.config/godot
        mkdir -p ~/.local/share/godot
        "$GODOT_BINARY" --headless --import 2>&1 || true
        echo "Project import step completed"

    - name: Generate test data
      run: |
        if [ -f "test_data/generate_test_data.py" ]; then
          cd test_data
          python3 generate_test_data.py
          echo "Test data generated"
        else
          echo "No test data generator found, proceeding without pre-generated data"
        fi

    - name: Run baseline QA tests
      env:
        DISPLAY: :99
        GS_CI_GPU_REQUIRED: "0"
      run: |
        python3 tests/ci/run_baseline_qa.py --categories ply,pipeline,runtime,module
      continue-on-error: false

    - name: Collect test results
      if: always()
      run: |
        echo "Collecting test result files..."

        # Collect JSON results from user directory
        if [ -d "$HOME/.local/share/godot/app_userdata" ]; then
          find "$HOME/.local/share/godot/app_userdata" -name "*test_results.json" -exec cp {} . \;
        fi

        # Collect main test result
        if [ -f "baseline_qa_results.json" ]; then
          echo "Main test results found"
        else
          echo "Main test results not found"
        fi

        # List all collected files
        ls -la *.json || echo "No JSON files found"

    - name: Generate test summary
      if: always()
      run: |
        echo "# Baseline QA Test Results (CPU)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- Trigger: \`${{ github.event_name }}\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        if [ -f "baseline_qa_results.json" ]; then
          # Parse JSON results
          TOTAL=$(python3 -c "import json; data=json.load(open('baseline_qa_results.json')); print(data['total_tests'])")
          PASSED=$(python3 -c "import json; data=json.load(open('baseline_qa_results.json')); print(data['passed_tests'])")
          FAILED=$(python3 -c "import json; data=json.load(open('baseline_qa_results.json')); print(data['failed_tests'])")

          echo "## Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Total Tests | $TOTAL |" >> $GITHUB_STEP_SUMMARY
          echo "| Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
          echo "| Failed | $FAILED |" >> $GITHUB_STEP_SUMMARY

          SUCCESS_RATE=$(python3 -c "print(round($PASSED/$TOTAL*100, 1) if $TOTAL > 0 else 0)")
          echo "| Success Rate | ${SUCCESS_RATE}% |" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Test Details" >> $GITHUB_STEP_SUMMARY

        python3 - <<'PY' >> $GITHUB_STEP_SUMMARY
        import json

        data = json.load(open("baseline_qa_results.json", encoding="utf-8"))
        for test in data["tests"]:
            status = "PASS" if test["success"] else "FAIL"
            print(f"- {status} **{test['name']}** ({test['duration']:.1f}s)")
            if not test["success"] and test.get("stderr"):
                print(f"  - Error: {test['stderr'][:100]}...")
        PY

          if [ "$FAILED" -gt 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## Failure Analysis" >> $GITHUB_STEP_SUMMARY
            echo "Please check the job logs for actionable failure analysis." >> $GITHUB_STEP_SUMMARY
          fi
        else
          echo "Test results file not found" >> $GITHUB_STEP_SUMMARY
        fi

    - name: Upload test artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: baseline-qa-cpu-results
        path: |
          baseline_qa_results.json
          tests/ci/qa_results.json
          *test_results.json
          *.log
        if-no-files-found: warn
        retention-days: 30

    - name: Comment on PR (success only)
      if: github.event_name == 'pull_request' && success()
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');

          let comment = '## Baseline QA Test Results (CPU)\n\n';

          try {
            const results = JSON.parse(fs.readFileSync('baseline_qa_results.json', 'utf8'));

            const total = results.total_tests;
            const passed = results.passed_tests;
            const successRate = total > 0 ? (passed/total*100).toFixed(1) : 0;

            comment += '| Test Suite | Status | Details |\n';
            comment += '|------------|--------|---------|\n';

            for (const test of results.tests) {
              const status = test.success ? 'PASS' : 'FAIL';
              const duration = test.duration.toFixed(1);
              comment += `| ${test.name} | ${status} | ${duration}s |\n`;
            }

            comment += `\n**Summary:** ${passed}/${total} tests passed (${successRate}%)\n`;

          } catch (error) {
            comment += 'Could not parse test results. Check the job logs for details.\n';
          }

          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });
