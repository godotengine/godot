name: Gaussian Production Gates

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]
    branches: [master]
    paths:
      - "core/**"
      - "drivers/**"
      - "editor/**"
      - "main/**"
      - "modules/**"
      - "platform/**"
      - "scene/**"
      - "servers/**"
      - "thirdparty/**"
      - "*.py"
      - "SConstruct"
      - "tests/**"
      - ".github/workflows/gaussian_production_gates.yml"
  push:
    branches: [master, develop]
    paths:
      - "core/**"
      - "drivers/**"
      - "editor/**"
      - "main/**"
      - "modules/**"
      - "platform/**"
      - "scene/**"
      - "servers/**"
      - "thirdparty/**"
      - "*.py"
      - "SConstruct"
      - "tests/**"
      - ".github/workflows/gaussian_production_gates.yml"
  workflow_dispatch:
    inputs:
      run_gpu_lane:
        description: "Run self-hosted Windows GPU evidence lane"
        required: false
        default: false
        type: boolean
      run_openworld_proof_dev:
        description: "Run non-blocking openworld-proof-dev benchmark evidence surface"
        required: false
        default: false
        type: boolean
      run_openworld_proof_weekly:
        description: "Run non-blocking openworld-proof-weekly benchmark evidence surface"
        required: false
        default: false
        type: boolean
      enforce_gpu_readiness:
        description: "Fail if summary.json readiness booleans are not all true"
        required: false
        default: false
        type: boolean
      runtime_loops:
        description: "Runtime loop count for evidence collection"
        required: false
        default: "3"
        type: string
  schedule:
    - cron: "30 3 * * 1"
  merge_group:
    types: [checks_requested]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: gaussian-production-gates-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  guards:
    name: Guards (Render Path + Static Safety)
    if: ${{ github.event_name != 'schedule' && !(github.event_name == 'workflow_dispatch' && (inputs.run_openworld_proof_dev == true || inputs.run_openworld_proof_weekly == true)) }}
    runs-on: [self-hosted, Windows, X64, godotgs]
    timeout-minutes: 10
    defaults:
      run:
        working-directory: repo
    steps:
      - name: Configure Git safe.directory for self-hosted workspace
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: |
          git config --global --add safe.directory '*'

      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: repo
          fetch-depth: 0
          submodules: recursive
          set-safe-directory: false

      - name: Verify Python on runner
        shell: pwsh
        run: |
          python --version

      - name: Run guard checks
        shell: pwsh
        run: |
          python tests/ci/run_module_tests.py --guard-only

  gpu-evidence-requirement:
    name: GPU Evidence Requirement
    if: ${{ github.event_name != 'schedule' && !(github.event_name == 'workflow_dispatch' && (inputs.run_openworld_proof_dev == true || inputs.run_openworld_proof_weekly == true)) }}
    runs-on: ubuntu-latest
    needs: guards
    outputs:
      run_windows_gpu: ${{ steps.decide.outputs.run_windows_gpu }}
      reason: ${{ steps.decide.outputs.reason }}
    steps:
      - name: Decide whether Windows GPU evidence is required
        id: decide
        uses: actions/github-script@v7
        with:
          script: |
            const fallbackLabel = "ci/gpu-runner-unavailable";
            let runWindowsGpu = false;
            let reason = "not-required";

            if (context.eventName === "workflow_dispatch") {
              const requested = String(context.payload.inputs?.run_gpu_lane || "false").toLowerCase();
              runWindowsGpu = requested === "true";
              reason = runWindowsGpu ? "manual-dispatch" : "manual-dispatch-disabled";
            } else if (context.eventName === "pull_request" || context.eventName === "merge_group") {
              const owner = context.repo.owner;
              const repo = context.repo.repo;
              const renderStreamingPrefixes = [
                "modules/gaussian_splatting/renderer/",
                "modules/gaussian_splatting/shaders/",
                "modules/gaussian_splatting/core/gaussian_streaming",
              ];

              let changedPaths = [];
              if (context.eventName === "pull_request") {
                const pullNumber = context.payload.pull_request.number;
                const files = await github.paginate(github.rest.pulls.listFiles, {
                  owner,
                  repo,
                  pull_number: pullNumber,
                  per_page: 100,
                });
                changedPaths = files.map((file) => String(file.filename || ""));
              } else {
                // merge_group: compare head against base using the merge group refs.
                // Note: compareCommitsWithBasehead caps at 300 files without pagination.
                // Acceptable for this repo's typical PR size; revisit if merge-queue
                // batches routinely exceed 300 changed files.
                const base = context.payload.merge_group.base_sha;
                const head = context.payload.merge_group.head_sha;
                const compare = await github.rest.repos.compareCommitsWithBasehead({
                  owner,
                  repo,
                  basehead: `${base}...${head}`,
                  per_page: 100,
                });
                changedPaths = (compare.data.files || []).map((file) => String(file.filename || ""));
              }

              runWindowsGpu = changedPaths.some((path) =>
                renderStreamingPrefixes.some((prefix) => path.startsWith(prefix))
              );
              reason = runWindowsGpu ? "render-streaming-path-change" : "no-render-streaming-changes";

              // Honor the fallback label for both pull_request and merge_group events.
              // merge_group doesn't carry PR labels directly, so look them up via
              // the head_ref which encodes the PR number (e.g. "gh-readonly-queue/main/pr-123/...").
              let labels = [];
              if (context.eventName === "pull_request") {
                labels = (context.payload.pull_request.labels || []).map((label) => label.name);
              } else if (context.eventName === "merge_group") {
                const headRef = context.payload.merge_group.head_ref || "";
                const prMatch = headRef.match(/\/pr-(\d+)\//);
                if (prMatch) {
                  try {
                    const { data: pr } = await github.rest.pulls.get({
                      owner, repo, pull_number: parseInt(prMatch[1]),
                    });
                    labels = (pr.labels || []).map((label) => label.name);
                  } catch (e) {
                    core.warning(`Could not fetch PR labels from merge_group head_ref: ${e.message}`);
                  }
                }
              }
              if (runWindowsGpu && labels.includes(fallbackLabel)) {
                runWindowsGpu = false;
                reason = `fallback-label:${fallbackLabel}`;
              }
            }

            core.info(`run_windows_gpu=${runWindowsGpu} reason=${reason}`);
            core.setOutput("run_windows_gpu", runWindowsGpu ? "true" : "false");
            core.setOutput("reason", reason);

      - name: Report decision
        shell: pwsh
        run: |
          echo "run_windows_gpu=${{ steps.decide.outputs.run_windows_gpu }}"
          echo "reason=${{ steps.decide.outputs.reason }}"

  module-validation:
    name: Module Build + Runtime Harness (Windows Self-Hosted)
    if: ${{ github.event_name != 'schedule' && !(github.event_name == 'workflow_dispatch' && (inputs.run_openworld_proof_dev == true || inputs.run_openworld_proof_weekly == true)) }}
    runs-on: [self-hosted, Windows, X64, godotgs, gpu]
    needs:
      - guards
      - gpu-evidence-requirement
    timeout-minutes: 120
    defaults:
      run:
        working-directory: repo
    steps:
      - name: Configure Git safe.directory for self-hosted workspace
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: |
          git config --global --add safe.directory '*'

      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: repo
          fetch-depth: 0
          submodules: recursive
          set-safe-directory: false

      - name: Verify Python on runner
        shell: pwsh
        run: |
          python --version

      - name: Set up MSVC build env
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install SCons
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install scons

      - name: Build Godot editor with tests
        shell: pwsh
        run: |
          python -m SCons platform=windows target=editor dev_build=yes tests=yes gs_native_arch=no cache_path=C:/godotgs-scons-cache cache_limit=50 -j12

      - name: Resolve Godot binary
        id: godot_bin
        shell: pwsh
        run: |
          $candidates = @(
            "bin\\godot.windows.editor.dev.x86_64.console.exe",
            "bin\\godot.windows.editor.dev.x86_64.exe",
            "bin\\godot.windows.editor.x86_64.console.exe",
            "bin\\godot.windows.editor.x86_64.exe"
          )
          $resolved = $null
          foreach ($candidate in $candidates) {
            if (Test-Path -LiteralPath $candidate) {
              $resolved = (Resolve-Path -LiteralPath $candidate).Path
              break
            }
          }
          if (-not $resolved) {
            throw "Could not find built Godot binary in expected bin\ paths."
          }
          Write-Host "Resolved Godot binary: $resolved"
          "path=$resolved" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Run Gaussian pipeline smoke tests
        shell: pwsh
        run: |
          python tests/ci/run_baseline_qa.py --category pipeline --godot "${{ steps.godot_bin.outputs.path }}"

      - name: Run module tests
        env:
          GODOT_BINARY: ${{ steps.godot_bin.outputs.path }}
        shell: pwsh
        run: |
          python tests/ci/run_module_tests.py --godot-binary "$env:GODOT_BINARY"

      - name: Run runtime validation harness (headless structural gate)
        env:
          GODOT_BINARY: ${{ steps.godot_bin.outputs.path }}
        shell: pwsh
        run: |
          python tests/runtime/run_runtime_validation.py `
            --godot-binary "$env:GODOT_BINARY" `
            --profile headless-ci `
            --gd-mode headless `
            --skip-cpp `
            --fail-on-skip

      - name: Run streaming GPU runtime gate (canonical blocking profile, windows-vulkan)
        env:
          GODOT_BINARY: ${{ steps.godot_bin.outputs.path }}
        shell: pwsh
        run: |
          python tests/runtime/run_runtime_validation.py `
            --godot-binary "$env:GODOT_BINARY" `
            --profile streaming-gpu-ci `
            --skip-cpp `
            --fail-on-skip

      - name: Upload runtime validation report
        if: ${{ always() && steps.godot_bin.outcome == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: runtime-validation-report
          path: repo/tests/runtime/runtime_validation_report.json

      - name: Collect production evidence
        id: evidence
        if: ${{ always() && needs.gpu-evidence-requirement.outputs.run_windows_gpu == 'true' && steps.godot_bin.outcome == 'success' }}
        shell: pwsh
        env:
          RUNTIME_LOOPS: ${{ github.event_name == 'workflow_dispatch' && inputs.runtime_loops || '3' }}
        run: |
          $runtimeLoops = [int]$env:RUNTIME_LOOPS
          .\tests\ci\collect_production_evidence.ps1 `
            -Root $PWD `
            -GodotBinary "${{ steps.godot_bin.outputs.path }}" `
            -OutputRoot (Join-Path $PWD "artifacts\evidence") `
            -RuntimeLoops $runtimeLoops

          $latest = Get-ChildItem (Join-Path $PWD "artifacts\evidence") -Directory | Sort-Object LastWriteTimeUtc -Descending | Select-Object -First 1
          if (-not $latest) {
            throw "Evidence directory not found after run."
          }
          "dir=$($latest.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload evidence artifact
        if: ${{ always() && needs.gpu-evidence-requirement.outputs.run_windows_gpu == 'true' && steps.evidence.outputs.dir != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: windows-gpu-production-evidence
          path: ${{ steps.evidence.outputs.dir }}

      - name: Enforce readiness booleans
        if: ${{ (inputs.enforce_gpu_readiness == true || inputs.enforce_gpu_readiness == 'true') && needs.gpu-evidence-requirement.outputs.run_windows_gpu == 'true' && steps.evidence.outcome == 'success' && steps.evidence.outputs.dir != '' }}
        shell: pwsh
        run: |
          $summaryPath = Join-Path "${{ steps.evidence.outputs.dir }}" "summary.json"
          if (-not (Test-Path -LiteralPath $summaryPath)) {
            throw "Missing summary.json at $summaryPath"
          }

          $summary = Get-Content -LiteralPath $summaryPath -Raw | ConvertFrom-Json
          $required = @("897_907_ready", "900_ready", "871_ready", "815_ready", "902_ready")
          $missing = @()
          foreach ($key in $required) {
            if (-not $summary.issues.$key) {
              $missing += $key
            }
          }

          if ($missing.Count -gt 0) {
            throw ("Production readiness checks failed: " + ($missing -join ", "))
          }

  openworld-proof-evidence:
    name: Open-World Proof Evidence (non-blocking)
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && (inputs.run_openworld_proof_dev == true || inputs.run_openworld_proof_weekly == true)) }}
    continue-on-error: true
    runs-on: [self-hosted, Windows, X64, godotgs, gpu]
    timeout-minutes: 120
    defaults:
      run:
        working-directory: repo
    steps:
      - name: Configure Git safe.directory for self-hosted workspace
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: |
          git config --global --add safe.directory '*'

      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: repo
          fetch-depth: 0
          submodules: recursive
          set-safe-directory: false

      - name: Verify Python on runner
        shell: pwsh
        run: |
          python --version

      - name: Set up MSVC build env
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install SCons
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install scons

      - name: Build Godot editor with tests
        shell: pwsh
        run: |
          python -m SCons platform=windows target=editor dev_build=yes tests=yes gs_native_arch=no cache_path=C:/godotgs-scons-cache cache_limit=50 -j12

      - name: Resolve Godot binary
        id: godot_bin
        shell: pwsh
        run: |
          $candidates = @(
            "bin\\godot.windows.editor.dev.x86_64.console.exe",
            "bin\\godot.windows.editor.dev.x86_64.exe",
            "bin\\godot.windows.editor.x86_64.console.exe",
            "bin\\godot.windows.editor.x86_64.exe"
          )
          $resolved = $null
          foreach ($candidate in $candidates) {
            if (Test-Path -LiteralPath $candidate) {
              $resolved = (Resolve-Path -LiteralPath $candidate).Path
              break
            }
          }
          if (-not $resolved) {
            throw "Could not find built Godot binary in expected bin\ paths."
          }
          Write-Host "Resolved Godot binary: $resolved"
          "path=$resolved" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Prepare canonical synthetic assets
        shell: pwsh
        run: |
          python tests/runtime/prepare_synthetic_assets.py --quiet

      - name: Run openworld-proof-dev evidence surface
        id: openworld_proof_dev
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_openworld_proof_dev == true }}
        continue-on-error: true
        env:
          GODOT_BINARY: ${{ steps.godot_bin.outputs.path }}
        shell: pwsh
        run: |
          $outputDir = Join-Path $PWD "tests\output\benchmark_evidence\openworld-proof-dev"
          python tests/runtime/run_benchmark.py `
            --godot-binary "$env:GODOT_BINARY" `
            --project-path tests/examples/godot/test_project `
            --profile performance `
            --lane open_world_corridor_proof `
            --lane city_flyover `
            --no-dashboard `
            --output-dir $outputDir

      - name: Summarize openworld-proof-dev evidence
        if: ${{ always() && github.event_name == 'workflow_dispatch' && inputs.run_openworld_proof_dev == true }}
        shell: pwsh
        run: |
          $surfaceName = "openworld-proof-dev"
          $outputDir = Join-Path $PWD "tests\output\benchmark_evidence\openworld-proof-dev"
          $summaryPath = Join-Path $outputDir "benchmark_suite_summary.md"
          $stepSummary = $env:GITHUB_STEP_SUMMARY
          Add-Content -LiteralPath $stepSummary -Value ""
          Add-Content -LiteralPath $stepSummary -Value "## $surfaceName (non-blocking evidence)"
          Add-Content -LiteralPath $stepSummary -Value ""
          if (Test-Path -LiteralPath $summaryPath) {
            Get-Content -LiteralPath $summaryPath | Add-Content -LiteralPath $stepSummary
          } else {
            Add-Content -LiteralPath $stepSummary -Value "- Benchmark summary not produced."
          }

      - name: Upload openworld-proof-dev evidence artifact
        if: ${{ always() && github.event_name == 'workflow_dispatch' && inputs.run_openworld_proof_dev == true }}
        uses: actions/upload-artifact@v4
        with:
          name: openworld-proof-dev-evidence
          path: repo/tests/output/benchmark_evidence/openworld-proof-dev
          if-no-files-found: warn

      - name: Run openworld-proof-weekly evidence surface
        id: openworld_proof_weekly
        if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_openworld_proof_weekly == true) }}
        continue-on-error: true
        env:
          GODOT_BINARY: ${{ steps.godot_bin.outputs.path }}
        shell: pwsh
        run: |
          $outputDir = Join-Path $PWD "tests\output\benchmark_evidence\openworld-proof-weekly"
          python tests/runtime/run_benchmark.py `
            --godot-binary "$env:GODOT_BINARY" `
            --project-path tests/examples/godot/test_project `
            --profile performance `
            --lane long_soak `
            --no-dashboard `
            --output-dir $outputDir

      - name: Summarize openworld-proof-weekly evidence
        if: ${{ always() && (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_openworld_proof_weekly == true)) }}
        shell: pwsh
        run: |
          $surfaceName = "openworld-proof-weekly"
          $outputDir = Join-Path $PWD "tests\output\benchmark_evidence\openworld-proof-weekly"
          $summaryPath = Join-Path $outputDir "benchmark_suite_summary.md"
          $stepSummary = $env:GITHUB_STEP_SUMMARY
          Add-Content -LiteralPath $stepSummary -Value ""
          Add-Content -LiteralPath $stepSummary -Value "## $surfaceName (non-blocking evidence)"
          Add-Content -LiteralPath $stepSummary -Value ""
          if (Test-Path -LiteralPath $summaryPath) {
            Get-Content -LiteralPath $summaryPath | Add-Content -LiteralPath $stepSummary
          } else {
            Add-Content -LiteralPath $stepSummary -Value "- Benchmark summary not produced."
          }

      - name: Upload openworld-proof-weekly evidence artifact
        if: ${{ always() && (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_openworld_proof_weekly == true)) }}
        uses: actions/upload-artifact@v4
        with:
          name: openworld-proof-weekly-evidence
          path: repo/tests/output/benchmark_evidence/openworld-proof-weekly
          if-no-files-found: warn
