name: Release Builds

on:
  pull_request:
    branches: [master, main, develop]
    paths:
      - "core/**"
      - "drivers/**"
      - "editor/**"
      - "main/**"
      - "modules/**"
      - "platform/**"
      - "scene/**"
      - "servers/**"
      - "thirdparty/**"
      - "*.py"
      - "SConstruct"
      - ".github/workflows/release_builds.yml"
  push:
    branches: [master, main, develop]
    tags:
      - "v*"
    paths:
      - "core/**"
      - "drivers/**"
      - "editor/**"
      - "main/**"
      - "modules/**"
      - "platform/**"
      - "scene/**"
      - "servers/**"
      - "thirdparty/**"
      - "*.py"
      - "SConstruct"
      - ".github/workflows/release_builds.yml"
  schedule:
    # Nightly preview build at 02:30 UTC.
    - cron: "30 2 * * *"
  workflow_dispatch:
    inputs:
      publish_channel:
        description: "Release channel for manual runs"
        required: false
        default: none
        type: choice
        options:
          - none
          - nightly
          - stable
      release_tag:
        description: "Tag used for manual stable publish (required when publish_channel=stable)"
        required: false
        type: string
      release_name:
        description: "Optional custom release name for manual publish"
        required: false
        type: string
      keep_nightlies:
        description: "Nightly prereleases to keep when pruning (manual nightly only)"
        required: false
        default: "14"
        type: string

permissions:
  contents: write
  actions: read

concurrency:
  group: release-builds-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release_metadata:
    name: Resolve Release Metadata
    runs-on: ubuntu-latest
    outputs:
      channel: ${{ steps.meta.outputs.channel }}
      publish: ${{ steps.meta.outputs.publish }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      tag: ${{ steps.meta.outputs.tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
      keep_nightlies: ${{ steps.meta.outputs.keep_nightlies }}
    steps:
      - name: Resolve channel metadata
        id: meta
        env:
          INPUT_CHANNEL: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_channel || 'none' }}
          INPUT_RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || '' }}
          INPUT_RELEASE_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.release_name || '' }}
          INPUT_KEEP_NIGHTLIES: ${{ github.event_name == 'workflow_dispatch' && inputs.keep_nightlies || '14' }}
        run: |
          set -euo pipefail

          channel="ci"
          publish="false"
          prerelease="false"
          tag=""
          release_name=""
          keep_nightlies="${INPUT_KEEP_NIGHTLIES:-14}"

          if ! [[ "$keep_nightlies" =~ ^[0-9]+$ ]]; then
            keep_nightlies="14"
          fi

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            channel="stable"
            publish="true"
            prerelease="false"
            tag="${GITHUB_REF#refs/tags/}"
            release_name="GodotGS ${tag}"
          elif [[ "${GITHUB_EVENT_NAME}" == "schedule" ]]; then
            channel="nightly"
            publish="true"
            prerelease="true"
            date_utc="$(date -u +%Y%m%d)"
            tag="nightly-${date_utc}"
            release_name="GodotGS Nightly ${date_utc}"
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            case "${INPUT_CHANNEL}" in
              nightly)
                channel="nightly"
                publish="true"
                prerelease="true"
                date_utc="$(date -u +%Y%m%d)"
                tag="nightly-${date_utc}"
                release_name="GodotGS Nightly ${date_utc}"
                ;;
              stable)
                if [[ -z "${INPUT_RELEASE_TAG}" ]]; then
                  echo "Manual stable publish requires release_tag input."
                  exit 1
                fi
                channel="stable"
                publish="true"
                prerelease="false"
                tag="${INPUT_RELEASE_TAG}"
                release_name="GodotGS ${tag}"
                ;;
              *)
                channel="ci"
                publish="false"
                prerelease="false"
                ;;
            esac
          fi

          if [[ -n "${INPUT_RELEASE_NAME}" && "${publish}" == "true" ]]; then
            release_name="${INPUT_RELEASE_NAME}"
          fi

          echo "channel=${channel}" >> "$GITHUB_OUTPUT"
          echo "publish=${publish}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${prerelease}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "release_name=${release_name}" >> "$GITHUB_OUTPUT"
          echo "keep_nightlies=${keep_nightlies}" >> "$GITHUB_OUTPUT"

  build_linux:
    name: Build Linux Editor + Contributor Artifact
    runs-on: ubuntu-latest
    timeout-minutes: 120
    needs: release_metadata
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            scons \
            pkg-config \
            libx11-dev \
            libxcursor-dev \
            libxinerama-dev \
            libxi-dev \
            libxrandr-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libasound2-dev \
            libpulse-dev \
            libudev-dev \
            libvulkan-dev \
            mesa-vulkan-drivers

      - name: Restore SCons build cache
        uses: actions/cache@v4
        with:
          path: .scons_cache
          key: release-scons-linux-${{ hashFiles('SConstruct', 'methods.py') }}-${{ github.sha }}
          restore-keys: |
            release-scons-linux-${{ hashFiles('SConstruct', 'methods.py') }}-
            release-scons-linux-

      - name: Build module-enabled Linux editor
        run: |
          set -euo pipefail
          if [[ "${{ needs.release_metadata.outputs.channel }}" == "stable" ]]; then
            scons platform=linuxbsd target=editor cache_path=.scons_cache cache_limit=10 -j"$(nproc)"
          else
            scons platform=linuxbsd target=editor dev_build=yes cache_path=.scons_cache cache_limit=10 -j"$(nproc)"
          fi

      - name: Resolve built binary
        id: binary
        run: |
          set -euo pipefail
          godot_bin="$(find bin -maxdepth 1 -type f -executable -name 'godot*linuxbsd*editor*' | sort | head -n 1)"
          if [[ -z "${godot_bin}" ]]; then
            echo "Could not locate built Linux editor binary in bin/"
            ls -la bin || true
            exit 1
          fi
          echo "path=${godot_bin}" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "${godot_bin}")" >> "$GITHUB_OUTPUT"

      - name: Package artifacts + checksums
        id: package
        run: |
          set -euo pipefail

          mkdir -p dist

          binary_path="${{ steps.binary.outputs.path }}"
          binary_name="${{ steps.binary.outputs.name }}"
          cp "${binary_path}" "dist/${binary_name}"

          version_label="${{ needs.release_metadata.outputs.tag }}"
          if [[ -z "${version_label}" ]]; then
            version_label="${GITHUB_SHA:0:12}"
          fi

          archive_base="godotgs-linux-x86_64-${version_label}"
          archive_path="dist/${archive_base}.tar.xz"
          checksum_path="dist/${archive_base}.sha256"

          tar -C dist -cJf "${archive_path}" "${binary_name}"
          sha256sum "${archive_path}" > "${checksum_path}"

          cat > dist/BUILD-INFO.txt <<EOF
          channel=${{ needs.release_metadata.outputs.channel }}
          publish=${{ needs.release_metadata.outputs.publish }}
          tag=${{ needs.release_metadata.outputs.tag }}
          commit=${GITHUB_SHA}
          binary=${binary_name}
          generated_at_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          EOF

          echo "archive=${archive_path}" >> "$GITHUB_OUTPUT"
          echo "checksum=${checksum_path}" >> "$GITHUB_OUTPUT"

      - name: Upload contributor artifact
        uses: actions/upload-artifact@v4
        with:
          name: godotgs-linux-${{ needs.release_metadata.outputs.channel }}-${{ github.run_number }}
          path: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.checksum }}
            dist/BUILD-INFO.txt
          retention-days: 14

  build_windows:
    name: Build Windows Editor + Contributor Artifact
    runs-on: [self-hosted, Windows, X64, godotgs]
    needs: release_metadata
    # Never run self-hosted Windows job on untrusted PR code. PR artifact
    # validation is handled by the Linux job on GitHub-hosted runners.
    if: github.event_name != 'pull_request'
    timeout-minutes: 120
    defaults:
      run:
        working-directory: repo
    steps:
      - name: Configure Git safe.directory for self-hosted workspace
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: |
          git config --global --add safe.directory '*'

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: repo
          fetch-depth: 0
          submodules: recursive
          set-safe-directory: false

      - name: Verify Python on runner
        shell: pwsh
        run: |
          python --version

      - name: Set up MSVC build env
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install SCons
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install scons

      - name: Build module-enabled Windows editor
        shell: pwsh
        run: |
          $args = @(
            "platform=windows",
            "target=editor",
            "gs_native_arch=no",
            "cache_path=C:/godotgs-scons-cache",
            "cache_limit=50",
            "-j12"
          )
          if ("${{ needs.release_metadata.outputs.channel }}" -ne "stable") {
            $args += "dev_build=yes"
            $args += "tests=yes"
          }
          python -m SCons @args

      - name: Resolve Godot binaries
        id: godot_bin
        shell: pwsh
        run: |
          # Godot's Windows build emits a pair: the main GUI editor exe and a
          # small *.console.exe launcher that re-spawns the main exe with stdout
          # attached. Both must ship in the release zip. Without the main exe
          # (~230 MB), the launcher (~160 KB) cannot find its sibling and the
          # download is unusable.
          $allExes = @(Get-ChildItem -Path "bin" -Filter "godot.windows.editor*.x86_64.exe" -File -ErrorAction SilentlyContinue)
          $mainExes = @($allExes | Where-Object { $_.Name -notlike "*.console.exe" })
          $consoleExes = @($allExes | Where-Object { $_.Name -like "*.console.exe" })

          # A clean build (the runner does `git clean -ffdx` before invoking
          # scons) produces exactly one main exe and at most one console
          # wrapper per channel. Fail fast if the glob matches more than one
          # main exe — it means bin\ has stale artifacts from a previous
          # build with a different flavor, and silently picking one variant
          # is what caused the original broken-zip bug this commit fixes.
          if ($mainExes.Count -eq 0) {
            Write-Host "bin\ contents:"
            Get-ChildItem -Path "bin" -ErrorAction SilentlyContinue | Format-Table Name, Length | Out-String | Write-Host
            throw "Could not find main Godot editor exe in bin\ (looked for godot.windows.editor*.x86_64.exe excluding .console.exe)."
          }
          if ($mainExes.Count -gt 1) {
            Write-Host "bin\ contents:"
            Get-ChildItem -Path "bin" -ErrorAction SilentlyContinue | Format-Table Name, Length | Out-String | Write-Host
            $mainNames = ($mainExes | ForEach-Object { $_.Name }) -join ", "
            throw "Ambiguous main editor in bin\ — expected exactly one match for 'godot.windows.editor*.x86_64.exe' (excluding .console.exe), found $($mainExes.Count): $mainNames. Clean bin\ before rebuilding."
          }
          if ($consoleExes.Count -gt 1) {
            Write-Host "bin\ contents:"
            Get-ChildItem -Path "bin" -ErrorAction SilentlyContinue | Format-Table Name, Length | Out-String | Write-Host
            $consoleNames = ($consoleExes | ForEach-Object { $_.Name }) -join ", "
            throw "Ambiguous console wrapper in bin\ — expected at most one '*.console.exe', found $($consoleExes.Count): $consoleNames. Clean bin\ before rebuilding."
          }

          $main = $mainExes[0]
          Write-Host "Resolved main editor: $($main.FullName) ($([math]::Round($main.Length / 1MB, 1)) MB)"
          "main_path=$($main.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "main_name=$($main.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

          if ($consoleExes.Count -eq 1) {
            $console = $consoleExes[0]
            Write-Host "Resolved console wrapper: $($console.FullName) ($([math]::Round($console.Length / 1KB, 1)) KB)"
            "console_path=$($console.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            "console_name=$($console.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          } else {
            Write-Host "No .console.exe wrapper found; shipping main editor only."
          }

      - name: Package artifacts + checksums
        id: package
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path dist | Out-Null

          $mainPath = "${{ steps.godot_bin.outputs.main_path }}"
          $mainName = "${{ steps.godot_bin.outputs.main_name }}"
          Copy-Item -LiteralPath $mainPath -Destination (Join-Path "dist" $mainName) -Force

          $consolePath = "${{ steps.godot_bin.outputs.console_path }}"
          $consoleName = "${{ steps.godot_bin.outputs.console_name }}"
          $hasConsole = -not [string]::IsNullOrWhiteSpace($consolePath)
          if ($hasConsole) {
            Copy-Item -LiteralPath $consolePath -Destination (Join-Path "dist" $consoleName) -Force
          }

          $versionLabel = "${{ needs.release_metadata.outputs.tag }}"
          if ([string]::IsNullOrWhiteSpace($versionLabel)) {
            $versionLabel = "${{ github.sha }}".Substring(0, 12)
          }

          $distPath = (Resolve-Path "dist").Path
          $archiveBase = "godotgs-windows-x86_64-$versionLabel"
          $archiveName = "$archiveBase.zip"
          $archivePath = Join-Path $distPath $archiveName
          $checksumPath = Join-Path $distPath "$archiveBase.sha256"
          $archiveRelative = "dist/$archiveName"
          $checksumRelative = "dist/$archiveBase.sha256"
          $buildInfoPath = Join-Path $distPath "BUILD-INFO.txt"

          $buildInfoLines = @(
            "channel=${{ needs.release_metadata.outputs.channel }}"
            "publish=${{ needs.release_metadata.outputs.publish }}"
            "tag=${{ needs.release_metadata.outputs.tag }}"
            "commit=${{ github.sha }}"
            "binary=$mainName"
          )
          if ($hasConsole) {
            $buildInfoLines += "console_binary=$consoleName"
          }
          $buildInfoLines += "generated_at_utc=$(Get-Date -AsUTC -Format o)"
          $buildInfoLines | Set-Content -Path $buildInfoPath -Encoding utf8

          $filesToCompress = @($mainName, "BUILD-INFO.txt")
          if ($hasConsole) {
            $filesToCompress = @($mainName, $consoleName, "BUILD-INFO.txt")
          }

          Push-Location $distPath
          try {
            Compress-Archive -Path $filesToCompress -DestinationPath $archivePath -Force
          } finally {
            Pop-Location
          }

          $archiveSizeMB = [math]::Round((Get-Item $archivePath).Length / 1MB, 1)
          Write-Host "Built archive $archiveName ($archiveSizeMB MB) containing: $($filesToCompress -join ', ')"

          $hash = Get-FileHash -Algorithm SHA256 -Path $archivePath
          "{0}  {1}" -f $hash.Hash.ToLower(), $archiveName | Out-File -FilePath $checksumPath -Encoding ascii

          "archive=$archiveRelative" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "checksum=$checksumRelative" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload contributor artifact
        uses: actions/upload-artifact@v4
        with:
          name: godotgs-windows-${{ needs.release_metadata.outputs.channel }}-${{ github.run_number }}
          path: |
            repo/${{ steps.package.outputs.archive }}
            repo/${{ steps.package.outputs.checksum }}
          retention-days: 14

  publish_release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - release_metadata
      - build_linux
      - build_windows
    # Publish as long as the Linux lane succeeded. A Windows runner outage
    # must not prevent a Linux-only release; the Windows artifact is
    # downloaded optionally below and included if available.
    if: |
      always() &&
      needs.release_metadata.outputs.publish == 'true' &&
      needs.build_linux.result == 'success'
    steps:
      - name: Download Linux contributor artifact
        uses: actions/download-artifact@v4
        with:
          name: godotgs-linux-${{ needs.release_metadata.outputs.channel }}-${{ github.run_number }}
          path: release-assets/linux

      - name: Download Windows contributor artifact
        if: needs.build_windows.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: godotgs-windows-${{ needs.release_metadata.outputs.channel }}-${{ github.run_number }}
          path: release-assets/windows

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release_metadata.outputs.tag }}
          name: ${{ needs.release_metadata.outputs.release_name }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ needs.release_metadata.outputs.prerelease == 'true' }}
          draft: false
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            release-assets/linux/godotgs-linux-x86_64-${{ needs.release_metadata.outputs.tag }}.tar.xz
            release-assets/linux/godotgs-linux-x86_64-${{ needs.release_metadata.outputs.tag }}.sha256
            release-assets/linux/BUILD-INFO.txt
            release-assets/windows/godotgs-windows-x86_64-${{ needs.release_metadata.outputs.tag }}.zip
            release-assets/windows/godotgs-windows-x86_64-${{ needs.release_metadata.outputs.tag }}.sha256
          overwrite_files: true

  prune_nightly_history:
    name: Prune old nightly prereleases
    runs-on: ubuntu-latest
    needs:
      - release_metadata
      - publish_release
    if: needs.release_metadata.outputs.channel == 'nightly' && needs.release_metadata.outputs.publish == 'true'
    steps:
      - name: Delete old nightly releases/tags
        uses: actions/github-script@v7
        with:
          script: |
            const keepCount = Number('${{ needs.release_metadata.outputs.keep_nightlies }}' || '14');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100,
            });
            const nightlies = releases
              .filter((release) => release.tag_name && release.tag_name.startsWith('nightly-'))
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            const stale = nightlies.slice(Math.max(keepCount, 0));
            core.info(`Nightly releases found: ${nightlies.length}. Keeping: ${keepCount}. Pruning: ${stale.length}.`);

            for (const release of stale) {
              core.info(`Deleting release ${release.tag_name} (${release.id})`);
              await github.rest.repos.deleteRelease({
                owner,
                repo,
                release_id: release.id,
              });

              try {
                await github.rest.git.deleteRef({
                  owner,
                  repo,
                  ref: `tags/${release.tag_name}`,
                });
                core.info(`Deleted tag ${release.tag_name}`);
              } catch (error) {
                core.warning(`Failed to delete tag ${release.tag_name}: ${error.message}`);
              }
            }
