scene="res://completion/get_node/get_node.tscn"
[output]
include=[
	; Utility Functions
	{"display": "print(…)", "insert_text": "print("},

	; Node
	{"display": "add_child(…)"},
	{"display": "owner"},
	{"display": "child_entered_tree"},

	; GDScript: class_a.notest.gd
	{"display": "property_of_a"},
	{"display": "func_of_a()"},
	{"display": "signal_of_a"},

	; GDScript: identifiers.gd
	{"display": "test_signal_1"},
	{"display": "test_signal_2"},
	{"display": "test_var_1"},
	{"display": "test_var_2"},
	{"display": "test_func_1(…)"},
	{"display": "test_func_2(…)"},
	{"display": "test_parameter_1"},
	{"display": "test_parameter_2"},
	{"display": "local_test_var_1"},
	{"display": "local_test_var_2"},

	; Native Class
	{ "display": "Node2D", "kind": 0 }, ; CODE_COMPLETION_KIND_CLASS
	{ "display": "ClassDB" },

	; Constants
	{ "display": "PI", "kind": 6 }, ; CODE_COMPLETION_KIND_CONSTANT
	{ "display": "null" },
	{ "display": "PROPERTY_USAGE_DEFAULT", "kind": 6},

	; TODO: Autoloads, class_name -> currently unsupported by the test runner
]
exclude=[
	; Internal class.
	{"display": "GDScriptFunctionState"},
]
