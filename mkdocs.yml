site_name: Godot Gaussian Splatting Docs
site_description: Versioned documentation for the Godot Gaussian Splatting module.
repo_url: !ENV [DOCS_REPO_URL, "https://github.com/OWNER/REPO"]
edit_uri: !ENV [DOCS_EDIT_URI, "edit/master/docs/"]
docs_dir: .site/public-docs
site_dir: .site/site
use_directory_urls: true
exclude_docs: README.md

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.highlight
    - search.suggest

plugins:
  - search
  - mike:
      version_selector: true
      canonical_version: latest
  - awesome-nav
  - glightbox
  - git-revision-date-localized:
      enabled: !ENV [ENABLE_GIT_DATES, true]
      enable_creation_date: true
      fallback_to_build_date: true
      enable_git_follow: false
  - redirects:
      redirect_maps: {}
  - charts

extra:
  version:
    provider: mike

extra_javascript:
  - https://cdn.jsdelivr.net/npm/vega@5
  - https://cdn.jsdelivr.net/npm/vega-lite@5
  - https://cdn.jsdelivr.net/npm/vega-embed@6

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
        - name: vegalite
          class: vegalite
          format: !!python/name:mkdocs_charts_plugin.fences.fence_vegalite
  - pymdownx.tabbed:
      alternate_style: true
